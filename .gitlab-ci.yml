image: node:22

stages:
  - deploy

cache:
  paths:
    - node_modules/

deploy:
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: on_success
    - if: $CI_COMMIT_BRANCH
      when: manual
    - when: never
  script:
    - eval $(ssh-agent -s)
    - chmod 400 "${SSH_PRIVATE_KEY}"
    - ssh-add "${SSH_PRIVATE_KEY}"
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - cp "${ENV_FILE}" .env
    - echo "APP_VERSION=${CI_COMMIT_SHORT_SHA}" >> .env
    - ssh-keyscan ${SSH_HOST} >> ~/.ssh/known_hosts
    - npm i
    - npm run deploy
