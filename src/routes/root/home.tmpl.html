<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="stylesheet" href="/style.css" />
    <title>szambo.tsaryk.com</title>
  </head>
  <body class="home">
    __CONFIG__.adminPanel
    <hr />
    <h3>
      Levels
      <span class="freq"
        >[<a href="__CONFIG__.freq1Href"><sup>1</sup>&frasl;<sub>1</sub></a
        >]&nbsp;[<a href="__CONFIG__.freq2Href"><sup>2</sup>&frasl;<sub>1</sub></a
        >]&nbsp;[<a href="__CONFIG__.freq3Href"><sup>3</sup>&frasl;<sub>1</sub></a
        >]&nbsp;[<a href="__CONFIG__.freq4Href"><sup>4</sup>&frasl;<sub>1</sub></a
        >]</span
      >
    </h3>
    <div class="chart-wrapper">
      <canvas id="chart"></canvas>
    </div>
    __CONFIG__.levels
    <h3>Logs</h3>
    __CONFIG__.logs
    <hr />
    <footer>
      <a href="__CONFIG__.levelsHref">Levels</a>
      &nbsp;|&nbsp;
      <a href="__CONFIG__.logsHref">Logs</a>
      &nbsp;|&nbsp;
      <span style="__CONFIG__.adminModeLinkStyle"><a href="/">Admin mode</a>&nbsp;|&nbsp;</span>
      <a href="/version">Version</a>
      &nbsp;|&nbsp;
      <a href="https://github.com/phts/szambo.tsaryk.com" target="_blank">© Phil Tsaryk, 2026</a>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
      const dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
      const ctx = document.getElementById('chart')
      const plugin = {
        id: 'horizontalLine',
        defaults: {},
        afterDraw: (chart, _, options) => {
          const {ctx} = chart
          const {left, right} = chart.chartArea
          const scale = chart.scales.y
          const width = options.width || 1
          const color = options.color || '#000'
          const value = options.value ? scale.getPixelForValue(options.value) : 0
          ctx.beginPath()
          ctx.lineWidth = width
          ctx.moveTo(left, value)
          ctx.lineTo(right, value)
          ctx.strokeStyle = color
          ctx.stroke()
        },
      }
      const toXLabel = (isoDate) => {
        const date = new Date(Date.parse(isoDate))
        return date.getDate().toString().padStart('2', '0') + '.' + (date.getMonth() + 1).toString().padStart('2', '0')
      }
      Chart.register(plugin)
      new Chart(ctx, {
        type: 'bar',
        data: {
          datasets: [
            {
              data: __CONFIG__.chartData,
              borderWidth: 1,
            },
          ],
        },
        options: {
          animation: false,
          elements: {
            bar: {
              backgroundColor: (ctx) => (ctx.parsed.y >= __CONFIG__.warningLevel ? '#f60' : dark ? '#c8c6c3' : '#000'),
            },
          },
          scales: {
            x: {
              ticks: {
                autoSkip: false,
                maxRotation: 90,
                minRotation: 90,
                callback: function (value, index) {
                  const label = toXLabel(this.getLabelForValue(value))
                  if (index === 0) {
                    return label
                  }
                  const prevValue = this.ticks[index - 1].value
                  const prevLabel = toXLabel(this.getLabelForValue(prevValue))
                  if (label === prevLabel) {
                    return ''
                  }
                  return label
                },
              },
              grid: {
                display: false,
              },
            },
            y: {
              beginAtZero: true,
              max: 100,
              min: 0,
              border: {
                dash: [5, 5],
              },
              ticks: {
                callback: (value) => value + ' %',
                color: dark ? '#c8c6c3' : undefined,
              },
              grid: {
                color: dark ? '#333' : undefined,
              },
            },
            cubes: {
              position: 'right',
              max: 6,
              min: 0,
              ticks: {
                callback: (value) => value + ' m³',
                color: dark ? '#c8c6c3' : undefined,
              },
              grid: {
                color: dark ? '#333' : undefined,
              },
            },
          },
          plugins: {
            legend: {
              display: false,
            },
            horizontalLine: {
              width: 1,
              color: '#f60',
              value: 83,
            },
            tooltip: {
              callbacks: {
                title: (ctx) =>
                  [new Date(Date.parse(ctx[0].label)).toLocaleString(), ctx[0].raw.label_m3, ctx[0].raw.errorRate]
                    .filter(Boolean)
                    .join('\n'),
              },
            },
          },
        },
      })
    </script>
  </body>
</html>
